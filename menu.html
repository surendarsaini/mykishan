<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu Toggle</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#111;
    padding:40px;
}

/* MENU BUTTON */

.menu-btn{
    padding:12px 25px;
    border:none;
    background:purple;
    color:white;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

/* MENU LIST */

.menu{
    width:200px;
    background:#222;
    margin-top:10px;
    border-radius:10px;

    display:none;
}

.menu ul{
    list-style:none;
}

.menu ul li{
    padding:15px;
    border-bottom:1px solid #444;
}

.menu ul li a{
    color:white;
    text-decoration:none;
    display:block;
}

.menu ul li:hover{
    background:purple;
}

</style>
</head>

<body>

<button class="menu-btn" onclick="showMenu()">
    ☰ Menu
</button>

<div class="menu" id="menu">

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

</div>

<script>

function showMenu(){

    let menu = document.getElementById("menu");

    if(menu.style.display === "block"){
        menu.style.display = "none";
    }

    else{
        menu.style.display = "block";
    }
}

</script>

</body>
</html>
